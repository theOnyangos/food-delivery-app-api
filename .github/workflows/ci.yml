name: ASL API CI

on:
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    test:
        name: Test Suite
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.3"
                  extensions: mbstring, xml, curl, zip, dom, bcmath, intl, gd, mysql
                  tools: composer:v2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Install NPM dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Run Feature and Unit tests
              run: php artisan test --without-tty tests/Feature tests/Unit

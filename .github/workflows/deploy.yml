name: Deploy ASL API to VPS

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        env:
            APP_ENV: testing
            APP_KEY: "base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
            BROADCAST_CONNECTION: log
            CACHE_STORE: array
            SESSION_DRIVER: array
            QUEUE_CONNECTION: sync

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.3"
                  extensions: mbstring, xml, curl, zip, dom, bcmath, intl, gd, mysql
                  tools: composer:v2

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install Composer dependencies
              run: composer install --no-interaction --prefer-dist

            - name: Install NPM dependencies
              run: npm ci

            - name: Build assets
              run: npm run build

            - name: Run Feature and Unit tests
              run: php artisan test --without-tty tests/Feature tests/Unit

    deploy:
        name: Deploy to VPS
        runs-on: ubuntu-latest
        needs: build
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

        steps:
            - name: Validate required secrets
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
              run: |
                  test -n "$DEPLOY_HOST" || (echo "::error::DEPLOY_HOST is missing" && exit 1)
                  test -n "$DEPLOY_USER" || (echo "::error::DEPLOY_USER is missing" && exit 1)
                  test -n "$DEPLOY_PATH" || (echo "::error::DEPLOY_PATH is missing" && exit 1)
                  test -n "$SSH_PRIVATE_KEY" || (echo "::error::SSH_PRIVATE_KEY is missing" && exit 1)

            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.DEPLOY_HOST }}
                  username: ${{ secrets.DEPLOY_USER }}
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  port: ${{ secrets.DEPLOY_PORT || 22 }}
                  script_stop: true
                  script: |
                      set -e
                      cd ${{ secrets.DEPLOY_PATH }}

                      echo "→ Pull latest code"
                      git fetch origin
                      git reset --hard origin/main

                      echo "→ Install PHP dependencies"
                      composer install --no-dev --optimize-autoloader --no-interaction

                      if [ -f package.json ]; then
                        echo "→ Install JS dependencies and build assets"
                        npm ci
                        npm run build
                      fi

                      echo "→ Run Laravel optimize + migrations"
                      php artisan config:cache
                      php artisan route:cache
                      php artisan view:cache
                      php artisan migrate --force

                      echo "→ Restart queue workers"
                      php artisan queue:restart || true

                      echo "✅ Deployment complete: $(git rev-parse --short HEAD)"
